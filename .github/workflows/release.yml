name: Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Existing release tag to rebuild artifacts for (e.g. v0.2.0). Leave empty to trigger release-please only."
        required: false
        default: ""
      release_version:
        description: "Version for tag_name without the v prefix (e.g. 0.2.0). Required when tag_name is set."
        required: false
        default: ""

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}${{ github.event_name == 'workflow_dispatch' && inputs.tag_name && format('-{0}', inputs.tag_name) || '' }}
  cancel-in-progress: ${{ github.event_name == 'push' }}

permissions:
  contents: write
  pull-requests: write
  id-token: write
  attestations: write
  actions: read

jobs:
  # ── Release-please (push to main only) — creates release PRs and tags ──
  release-please:
    runs-on: ubuntu-latest
    if: github.ref_type == 'branch' && github.ref == 'refs/heads/main'
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - uses: actions/checkout@v4
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # ── Resolve version info from tag or dispatch inputs ──
  decide:
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
    outputs:
      tag_name: ${{ steps.decide.outputs.tag_name }}
      version: ${{ steps.decide.outputs.version }}
    steps:
      - name: Validate and resolve version info
        id: decide
        env:
          TAG_NAME: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag_name }}
          RELEASE_VERSION: ${{ inputs.release_version }}
        run: |
          TAG="$TAG_NAME"
          if [ -z "$TAG" ]; then
            echo "::error::tag_name is required for tag push or workflow_dispatch with tag_name"
            exit 1
          fi
          VER="$RELEASE_VERSION"
          if [ -z "$VER" ]; then
            VER="${TAG#v}"
          fi
          echo "tag_name=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VER}" >> "$GITHUB_OUTPUT"

  # ── Validate release version against pyproject.toml ──────────────────────
  validate-release-version:
    needs: [decide]
    if: github.ref_type == 'tag' || (github.event_name == 'workflow_dispatch' && inputs.tag_name != '')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.decide.outputs.tag_name }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate release version
        env:
          RELEASE_VERSION: ${{ needs.decide.outputs.version }}
        run: |
          import os, sys, tomllib
          from pathlib import Path

          release_version = os.environ["RELEASE_VERSION"]
          pyproject = tomllib.loads(Path("pyproject.toml").read_text())
          project_version = pyproject["project"]["version"]

          if project_version != release_version:
              print(f"::error::pyproject.toml version {project_version} does not match release tag version {release_version}")
              sys.exit(1)

          print(f"Release version {release_version} matches pyproject.toml")
        shell: python

  # ── Build standalone binary (per platform) ─────────────────────────────────
  build-binary:
    needs: [decide, validate-release-version]
    if: github.ref_type == 'tag' || (github.event_name == 'workflow_dispatch' && inputs.tag_name != '')
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: dcc-mcp-photoshop-windows
            binary: dist/binary/dcc-mcp-photoshop.exe
            binary_name: dcc-mcp-photoshop.exe
          - os: ubuntu-latest
            artifact: dcc-mcp-photoshop-linux
            binary: dist/binary/dcc-mcp-photoshop
            binary_name: dcc-mcp-photoshop
          - os: macos-latest
            artifact: dcc-mcp-photoshop-macos
            binary: dist/binary/dcc-mcp-photoshop
            binary_name: dcc-mcp-photoshop
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.decide.outputs.tag_name }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Install PyOxidizer
        run: pip install pyoxidizer

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Smoke test — CLI entry point
        run: dcc-mcp-photoshop --version

      - name: Build standalone binary
        run: python tools/build_binary.py

      - name: Smoke test — standalone binary
        shell: bash
        run: |
          cd dist/binary
          if [ ! -f "${{ matrix.binary_name }}" ]; then
            echo "Binary not found: ${{ matrix.binary_name }}"
            exit 1
          fi
          "./${{ matrix.binary_name }}" --version
          "./${{ matrix.binary_name }}" --help

      - name: Package binary bundle (tar.gz)
        shell: bash
        run: |
          mkdir -p dist/archive
          cd dist/binary
          tar czf "../archive/${{ matrix.artifact }}.tar.gz" .
          echo "Created: $(ls -lh "../archive/${{ matrix.artifact }}.tar.gz")"

      - name: Upload binary archive
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/archive/${{ matrix.artifact }}.tar.gz

  # ── Build wheel + sdist ──────────────────────────────────────────────────────
  build:
    name: Build wheel and sdist
    needs: [decide, validate-release-version]
    if: github.ref_type == 'tag' || (github.event_name == 'workflow_dispatch' && inputs.tag_name != '')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.decide.outputs.tag_name }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install hatchling build

      - name: Install dev dependencies
        run: pip install ".[dev]"

      - name: Smoke test — CLI entry point
        run: dcc-mcp-photoshop --version

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Build wheel and sdist
        run: python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ── Build UXP plugin .ccx ───────────────────────────────────────────────────
  build-uxp-plugin:
    needs: [decide, validate-release-version]
    if: github.ref_type == 'tag' || (github.event_name == 'workflow_dispatch' && inputs.tag_name != '')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.decide.outputs.tag_name }}

      - name: Check if bridge/uxp-plugin exists
        id: check
        run: |
          if [ -d "bridge/uxp-plugin" ] && [ -f "bridge/uxp-plugin/manifest.json" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "bridge/uxp-plugin directory not found — skipping UXP plugin build"
          fi

      - name: Set up Python 3.12
        if: steps.check.outputs.exists == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dcc-mcp-core (for version detection)
        if: steps.check.outputs.exists == 'true'
        run: pip install dcc-mcp-core

      - name: Download dcc-mcp-server Windows binary from dcc-mcp-core release
        if: steps.check.outputs.exists == 'true'
        run: python tools/download_dcc_mcp_server.py --platform windows

      - name: Stage sidecar into UXP plugin tree
        if: steps.check.outputs.exists == 'true'
        run: python tools/stage_plugin_sidecar.py

      - name: Pack UXP plugin (.ccx)
        if: steps.check.outputs.exists == 'true'
        run: |
          python tools/pack_plugin.py --version "${{ needs.decide.outputs.version }}" --output dist/plugin
        shell: bash

      - name: Verify .ccx file was created
        if: steps.check.outputs.exists == 'true'
        shell: bash
        run: |
          ls -la dist/plugin/
          test -n "$(find dist/plugin/ -name '*.ccx' -print -quit)"

      - name: Upload plugin artifact
        if: steps.check.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: uxp-plugin
          path: dist/plugin/*.ccx

  # ── Publish to PyPI (tag push only, not on manual rebuild) ───────────────────
  publish:
    needs: [decide, validate-release-version, build]
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/dcc-mcp-photoshop
    permissions:
      id-token: write   # required for Trusted Publishing (OIDC)

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI (Trusted Publisher)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
          print-hash: true

  # ── Attach wheels + plugin + binaries to GitHub Release ─────────────────────
  attach-release-assets:
    needs: [decide, validate-release-version, build-uxp-plugin, build-binary]
    if: github.ref_type == 'tag' || (github.event_name == 'workflow_dispatch' && inputs.tag_name != '')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Download UXP plugin artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: uxp-plugin
          path: dist/plugin/

      - name: Download Windows binary archive
        uses: actions/download-artifact@v4
        with:
          name: dcc-mcp-photoshop-windows
          path: dist/bundle/

      - name: Download Linux binary archive
        uses: actions/download-artifact@v4
        with:
          name: dcc-mcp-photoshop-linux
          path: dist/bundle/

      - name: Download macOS binary archive
        uses: actions/download-artifact@v4
        with:
          name: dcc-mcp-photoshop-macos
          path: dist/bundle/

      - name: Rename archives with platform prefix
        run: |
          mv dist/bundle/dcc-mcp-photoshop-windows.tar.gz  dist/dcc-mcp-photoshop-windows.tar.gz  || true
          mv dist/bundle/dcc-mcp-photoshop-linux.tar.gz    dist/dcc-mcp-photoshop-linux.tar.gz    || true
          mv dist/bundle/dcc-mcp-photoshop-macos.tar.gz    dist/dcc-mcp-photoshop-macos.tar.gz    || true

      - name: Attach all assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.decide.outputs.tag_name }}
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/plugin/*.ccx
          fail_on_unmatched_files: false
