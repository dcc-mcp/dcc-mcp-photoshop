name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check src/ tests/

      - name: Run ruff format check
        run: ruff format --check src/ tests/

  lint-skills:
    name: Lint Skills
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Lint SKILL.md files
        run: python tools/lint_skills.py --error-only

  build-uxp-plugin:
    name: Build UXP Plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check if bridge/uxp-plugin exists
        id: check
        run: |
          if [ -d "bridge/uxp-plugin" ] && [ -f "bridge/uxp-plugin/manifest.json" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "bridge/uxp-plugin directory not found — skipping UXP plugin build"
          fi

      - name: Set up Python 3.12
        if: steps.check.outputs.exists == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dcc-mcp-core (for version detection)
        if: steps.check.outputs.exists == 'true'
        run: pip install dcc-mcp-core

      - name: Download dcc-mcp-server Windows binary
        if: steps.check.outputs.exists == 'true'
        run: python tools/download_dcc_mcp_server.py --platform windows

      - name: Stage sidecar into UXP plugin tree
        if: steps.check.outputs.exists == 'true'
        run: python tools/stage_plugin_sidecar.py

      - name: Pack UXP plugin (.ccx)
        if: steps.check.outputs.exists == 'true'
        run: python tools/pack_plugin.py --output dist/plugin

      - name: Upload plugin artifact
        if: steps.check.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: uxp-plugin
          path: dist/plugin/*.ccx
