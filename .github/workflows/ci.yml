name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          pip install pytest-cov
          pytest tests/ -v --tb=short --cov=src/dcc_mcp_photoshop --cov-report=term --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check src/ tests/

      - name: Run ruff format check
        run: ruff format --check src/ tests/

  lint-skills:
    name: Lint Skills
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Lint SKILL.md files
        run: python tools/lint_skills.py --error-only

  cli-smoke:
    name: CLI Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Verify CLI entry point
        run: |
          dcc-mcp-photoshop --help
          python -m dcc_mcp_photoshop --help

      - name: Start server briefly and verify it responds
        run: |
          dcc-mcp-photoshop --mcp-port 0 &
          SERVER_PID=$!
          sleep 2
          kill $SERVER_PID 2>/dev/null || true
        continue-on-error: true

  ci-gate:
    name: CI Gate
    if: always()
    needs: [test, lint, lint-skills, cli-smoke]
    runs-on: ubuntu-latest
    steps:
      - name: Require all CI jobs to pass
        if: needs.test.result != 'success' || needs.lint.result != 'success' || needs.lint-skills.result != 'success' || needs.cli-smoke.result != 'success'
        run: exit 1
