tools:
- name: execute_script
  description: Execute arbitrary JavaScript/UXP code in Photoshop. Use for advanced operations not covered by typed tools.
  source_file: scripts/execute_script.py
  execution: sync
  read_only: false
  destructive: false
  idempotent: false
  input_schema:
    type: object
    properties:
      code:
        type: string
        description: JavaScript/UXP code string to execute.
    additionalProperties: false
    required:
    - code
- name: execute_action
  description: Execute a named Photoshop Action from an Action Set via batchPlay.
  source_file: scripts/execute_action.py
  execution: sync
  read_only: false
  destructive: false
  idempotent: false
  input_schema:
    type: object
    properties:
      action:
        type: string
        description: Name of the Action to execute.
      action_set:
        type: string
        description: Name of the Action Set containing the Action. Default ``"Default"``.
        default: Default
    additionalProperties: false
    required:
    - action
